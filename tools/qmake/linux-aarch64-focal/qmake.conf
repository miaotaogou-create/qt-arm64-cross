# qmake 交叉编译：Qt 5.14.2 ARM64 + focal sysroot（glibc 2.31）
MAKEFILE_GENERATOR      = UNIX
CONFIG                 += incremental cross_compile
QMAKE_INCREMENTAL_STYLE = sublib

isEmpty(SYSROOT): SYSROOT = /opt/arm64-rootfs
isEmpty(QT_PREFIX): QT_PREFIX = /opt/Qt5.14.2-arm64
isEmpty(QT_HOST): QT_HOST = /opt/Qt5.14.2-host
CROSS_COMPILE           = aarch64-linux-gnu-

QMAKE_CFLAGS            += --sysroot=$$SYSROOT
QMAKE_CFLAGS            += -B$$SYSROOT/usr/lib/aarch64-linux-gnu
QMAKE_CXXFLAGS          += --sysroot=$$SYSROOT
QMAKE_CXXFLAGS          += -B$$SYSROOT/usr/lib/aarch64-linux-gnu
QMAKE_CXXFLAGS          += -isystem $$SYSROOT/usr/include/c++/9
QMAKE_CXXFLAGS          += -isystem $$SYSROOT/usr/include/aarch64-linux-gnu
QMAKE_CFLAGS            += -isystem $$SYSROOT/usr/include/aarch64-linux-gnu
QMAKE_LFLAGS            += --sysroot=$$SYSROOT
QMAKE_LFLAGS            += -Wl,-rpath-link,$$SYSROOT/lib/aarch64-linux-gnu
QMAKE_LFLAGS            += -Wl,-rpath-link,$$SYSROOT/usr/lib/aarch64-linux-gnu
QMAKE_LFLAGS            += -Wl,-rpath-link,$$QT_PREFIX/lib

QMAKE_INCDIR            += \
    $$SYSROOT/usr/include/aarch64-linux-gnu \
    $$QT_PREFIX/include \
    $$QT_PREFIX/include/QtCore \
    $$QT_PREFIX/include/QtGui \
    $$QT_PREFIX/include/QtWidgets \
    $$QT_PREFIX/include/QtMultimedia \
    $$QT_PREFIX/include/QtNetwork \
    $$QT_PREFIX/include/QtSql \
    $$QT_PREFIX/include/QtConcurrent

QMAKE_LIBDIR            += \
    $$QT_PREFIX/lib \
    $$SYSROOT/usr/lib/aarch64-linux-gnu \
    $$SYSROOT/lib/aarch64-linux-gnu

QMAKE_MODULE_PATH       = $$QT_PREFIX/mkspecs/modules

include(/usr/lib/x86_64-linux-gnu/qt5/mkspecs/common/linux.conf)
include(/usr/lib/x86_64-linux-gnu/qt5/mkspecs/common/gcc-base-unix.conf)
include(/usr/lib/x86_64-linux-gnu/qt5/mkspecs/common/g++-unix.conf)
load(qt_config)

QMAKE_CC                = aarch64-linux-gnu-gcc
QMAKE_CXX               = aarch64-linux-gnu-g++
QMAKE_LINK              = aarch64-linux-gnu-g++
QMAKE_LINK_SHLIB        = aarch64-linux-gnu-g++

QMAKE_MOC               = $$QT_HOST/bin/moc
QMAKE_UIC               = $$QT_HOST/bin/uic
QMAKE_RCC               = $$QT_HOST/bin/rcc

QMAKE_LIBS -= -lGL
exists($$SYSROOT/usr/lib/aarch64-linux-gnu/libGL.so): \
    QMAKE_LIBS += $$SYSROOT/usr/lib/aarch64-linux-gnu/libGL.so
exists($$SYSROOT/usr/lib/aarch64-linux-gnu/libstdc++.so.6): \
    QMAKE_LIBS += $$SYSROOT/usr/lib/aarch64-linux-gnu/libstdc++.so.6
exists($$SYSROOT/usr/lib/aarch64-linux-gnu/libgcc_s.so.1): \
    QMAKE_LIBS += $$SYSROOT/usr/lib/aarch64-linux-gnu/libgcc_s.so.1
